name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn từ Repository
      uses: actions/checkout@v3

    - name: Thiết lập môi trường JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Thực thi biên dịch và chạy tự động Unit Test với Maven
      run: mvn -B test --file JavaMaven-nguyennhungoc-110123030/pom.xml